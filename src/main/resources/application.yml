spring:
  application:
    name: 4-daniel-community-BE

  datasource:
    url: jdbc:mysql://localhost:3306/daniel_community?serverTimezone=UTC&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

jwt:
  secret: daniel-community-jwt-secret-key-for-development
  access-token-expiration: 3600000

logging:
  level:
    org.hibernate.SQL: debug